<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UvNL Titelbalk Generator</title>
<script>/* direct geopend → toon met de merkboek-navigatie; in een iframe → laat zoals het is */
if (window.top === window.self) { location.replace('../pages/titelbalk.html'); }</script>
<style>
:root{--bg:#090909;--surface:#141414;--border:#363636;--accent:#004B36;--accent-fg:#00c278;--lavender:#D6ACFF;--fg:#f0f0f0;--muted:#999;--input-bg:#080808;--hover-bg:#1e1e1e;--gap:1rem}
body.light{--bg:#eeede6;--surface:#ffffff;--border:#c8c7c0;--accent:#004B36;--accent-fg:#004B36;--lavender:#6b2fa0;--fg:#1a1a1a;--muted:#777;--input-bg:#f5f4ed;--hover-bg:#ebebE3}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;font-size:14px;min-height:100vh;padding:2rem;transition:background .2s,color .2s}
h1{font-size:1.1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--lavender);margin-bottom:1.5rem}
h1 span{color:var(--muted);font-weight:400;letter-spacing:.04em;text-transform:none;font-size:.9rem}
.layout{display:grid;grid-template-columns:280px 1fr;gap:1.5rem;max-width:1400px;margin:0 auto}
.sidebar{display:flex;flex-direction:column;gap:var(--gap)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem}
.card-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.9rem}
textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--fg);font-size:.95rem;padding:.75rem;resize:vertical;min-height:110px;font-family:inherit;line-height:1.6;outline:none}
textarea:focus{border-color:var(--accent)}
.ctrl{display:flex;align-items:center;gap:.6rem;margin-top:.7rem}
.ctrl-label{font-size:.78rem;color:var(--muted);min-width:80px}
.ctrl input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:99px;outline:none;cursor:pointer}
.ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.ctrl-val{font-size:.78rem;color:var(--fg);min-width:36px;text-align:right}
.ctrl input[type=color]{width:28px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none;padding:1px}
.color-hex{font-size:.78rem;color:var(--muted);font-variant-numeric:tabular-nums}
.btn-secondary{width:100%;background:transparent;color:var(--fg);border:1px solid var(--border);border-radius:5px;padding:.7rem;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:border-color .12s,background .12s}
.btn-secondary:hover{border-color:var(--lavender);background:var(--hover-bg)}
.btn-secondary--dim{color:var(--muted);font-size:.72rem}
.btn-add{width:100%;background:transparent;color:var(--lavender);border:1px dashed var(--border);border-radius:5px;padding:.65rem;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:border-color .12s,background .12s}
.btn-add:hover{border-color:var(--lavender);background:var(--hover-bg)}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .12s;margin-bottom:.75rem}
.item-card.active{border-color:var(--accent)}
.item-row{display:flex;gap:.5rem;padding:.75rem;align-items:flex-start}
.item-text{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--fg);font-size:.9rem;padding:.6rem;resize:vertical;min-height:66px;font-family:inherit;line-height:1.5;outline:none}
.item-text:focus{border-color:var(--accent)}
.item-actions{display:flex;flex-direction:column;gap:.3rem;flex-shrink:0}
.item-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:.8rem;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .12s,color .12s;line-height:1}
.item-btn:hover{border-color:var(--fg);color:var(--fg)}
.item-settings{padding:0 .75rem .75rem;border-top:1px solid var(--border);display:none}
.item-settings.open{display:block}
.item-settings .ctrl{margin-top:.55rem}
.hex-input{width:72px;background:#0a0a0a;border:1px solid var(--border);border-radius:4px;color:var(--fg);font-size:.78rem;font-family:monospace;padding:.25rem .4rem;outline:none;letter-spacing:.04em}
.style-select{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--fg);font-size:.78rem;font-family:inherit;padding:.3rem .4rem;outline:none;cursor:pointer}
.style-select:focus{border-color:var(--accent)}
.hex-input:focus{border-color:var(--accent)}
.palette-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:.9rem;margin-bottom:.4rem}
.palette{display:flex;flex-direction:column;gap:.3rem}
.palette-group{display:flex;flex-wrap:wrap;gap:.35rem}
.swatch{width:22px;height:22px;border-radius:4px;border:1px solid rgba(255,255,255,.1);cursor:pointer;padding:0;transition:transform .1s,box-shadow .1s}
.swatch:hover{transform:scale(1.2);box-shadow:0 0 0 2px var(--lavender)}
.btn-pipet{background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;padding:0;transition:border-color .12s,color .12s;flex-shrink:0}
.btn-pipet:hover{border-color:var(--lavender);color:var(--fg)}
.btn-pipet svg{display:block;width:14px;height:14px}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--gap)}
.preview-box.hidden{display:none}
.fmt-checks{display:flex;flex-direction:column;gap:.55rem;margin-top:.3rem}
.fmt-check{display:flex;align-items:center;gap:.6rem;cursor:pointer;user-select:none}
.fmt-check input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.fmt-check span{font-size:.8rem;color:var(--fg)}
.fmt-check small{font-size:.7rem;color:var(--muted);margin-left:auto}
.preview-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.preview-head{padding:.6rem .9rem;border-bottom:1px solid var(--border);display:flex;align-items:baseline;justify-content:space-between}
.preview-head h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.preview-head small{font-size:.65rem;color:var(--muted)}
.checker{flex:1;padding:.75rem;background:repeating-conic-gradient(#1c1c1c 0% 25%,#242424 0% 50%) 0 0/14px 14px;display:flex;align-items:center;justify-content:center;min-height:120px}
.checker canvas{max-width:100%;height:auto;display:block;outline:1px solid rgba(255,255,255,.15);box-shadow:0 0 0 1px rgba(0,0,0,.6),0 2px 12px rgba(0,0,0,.5);font-synthesis:none;-webkit-font-smoothing:antialiased}
.checker{position:relative}
.canvas-edit-overlay{position:absolute;inset:0;background:transparent;border:none;color:transparent;-webkit-text-fill-color:transparent;caret-color:#fff;resize:none;font-family:inherit;font-size:1rem;padding:.75rem;cursor:text;z-index:10;outline:none;width:100%;box-sizing:border-box;opacity:0;transition:opacity .15s}
.canvas-edit-overlay:focus{opacity:1;background:rgba(0,0,0,.55);color:#fff;-webkit-text-fill-color:#fff;font-size:1.1rem;line-height:1.6}
.checker:not(:focus-within)::after{content:'klik om te bewerken';position:absolute;bottom:.5rem;left:50%;transform:translateX(-50%);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.25);pointer-events:none;white-space:nowrap}
.btn-row{display:grid;grid-template-columns:1fr;border-top:1px solid var(--border)}
.btn-dl{display:block;width:100%;background:transparent;border:none;color:var(--lavender);padding:.55rem .4rem;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .12s;text-align:center}
.btn-dl+.btn-dl{border-left:1px solid var(--border)}
.btn-dl:hover{background:var(--hover-bg)}
.gallery-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-top:var(--gap)}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.65rem;margin-top:.75rem}
.gallery-item{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color .12s}
.gallery-item:hover{border-color:var(--lavender)}
.gallery-item .checker{min-height:70px;padding:.4rem}
.gallery-meta{padding:.3rem .5rem;font-size:.62rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid var(--border)}
.empty{color:var(--muted);font-size:.82rem;padding:.5rem 0}
.status-bar{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:.5rem 1.2rem;font-size:.78rem;color:var(--lavender);transition:transform .22s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:99;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.status-bar.show{transform:translateX(-50%) translateY(0)}
@media(max-width:900px){.layout{grid-template-columns:1fr}.preview-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem">
  <h1 style="margin-bottom:0">UvNL Titelbalk Generator <span>&#8212; titelbalken voor video &amp; socials</span></h1>
  <button onclick="toggleTheme()" id="themeBtn" style="background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);padding:.4rem .8rem;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:border-color .12s,color .12s;white-space:nowrap;flex-shrink:0;margin-left:1rem" onmouseover="this.style.borderColor='var(--lavender)';this.style.color='var(--fg)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">&#9788; Licht</button>
</div>

<div class="layout">
  <div class="sidebar">
    <div id="itemList"></div>
    <button class="btn-add" onclick="addItem()">+ Voeg titelbalk toe</button>
    <div class="card">
      <div class="card-label">Formaten</div>
      <div class="fmt-checks">
        <label class="fmt-check"><input type="checkbox" id="chk916" checked onchange="onFmtChange()"><span>9:16</span><small>1080×1920</small></label>
        <label class="fmt-check"><input type="checkbox" id="chk34" onchange="onFmtChange()"><span>3:4</span><small>1080×1440</small></label>
        <label class="fmt-check"><input type="checkbox" id="chk169" onchange="onFmtChange()"><span>16:9</span><small>1920×1080</small></label>
        <label class="fmt-check"><input type="checkbox" id="chk11" onchange="onFmtChange()"><span>1:1</span><small>1080×1080</small></label>
      </div>
    </div>
    <button class="btn-secondary" id="btnRenderAll" onclick="renderAll()">&#8595; Render alles</button>
    <button class="btn-secondary" id="btnDownload" onclick="downloadAll()">&#8595; Download huidige balk</button>
  </div>

  <div>
    <div class="preview-grid">
      <div class="preview-box" id="box916">
        <div class="preview-head"><h3>9:16</h3><small>1080 &times; 1920</small></div>
        <div class="checker"><canvas id="c916" width="1080" height="1920"></canvas></div>
        <div class="btn-row">
          <button class="btn-dl" onclick="dlFmt('916',1080,1920)">&#8595; PNG</button>
        </div>
      </div>
      <div class="preview-box hidden" id="box34">
        <div class="preview-head"><h3>3:4</h3><small>1080 &times; 1440</small></div>
        <div class="checker"><canvas id="c34" width="1080" height="1440"></canvas></div>
        <div class="btn-row">
          <button class="btn-dl" onclick="dlFmt('34',1080,1440)">&#8595; PNG</button>
        </div>
      </div>
      <div class="preview-box hidden" id="box169">
        <div class="preview-head"><h3>16:9</h3><small>1920 &times; 1080</small></div>
        <div class="checker"><canvas id="c169" width="1920" height="1080"></canvas></div>
        <div class="btn-row">
          <button class="btn-dl" onclick="dlFmt('169',1920,1080)">&#8595; PNG</button>
        </div>
      </div>
      <div class="preview-box hidden" id="box11">
        <div class="preview-head"><h3>1:1</h3><small>1080 &times; 1080</small></div>
        <div class="checker"><canvas id="c11" width="1080" height="1080"></canvas></div>
        <div class="btn-row">
          <button class="btn-dl" onclick="dlFmt('11',1080,1080)">&#8595; PNG</button>
        </div>
      </div>
    </div>
    <div class="gallery-wrap">
      <div class="card-label">Recente exports <span id="gCount" style="color:#444"></span></div>
      <div class="gallery-grid" id="galleryGrid">
        <p class="empty">Nog geen exports. Typ een titelbalk hierboven.</p>
      </div>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar"></div>

const G = id => document.getElementById(id);

const FMTS = [{id:'916',w:1080,h:1920},{id:'34',w:1080,h:1440},{id:'169',w:1920,h:1080},{id:'11',w:1080,h:1080}];

// ── Brand-switch NL/VL ────────────────────────────────────────
let BRAND = 'NL';
const brandLabel  = () => BRAND === 'VL' ? 'UvVL' : 'UvNL';
const brandPrefix = () => BRAND === 'VL' ? 'UVVL' : 'UVNL';

function applyBrand() {
  document.title = `${brandLabel()} Titelbalk Generator`;
  const h1 = document.querySelector('h1');
  if (h1 && h1.firstChild && h1.firstChild.nodeType === Node.TEXT_NODE) {
    h1.firstChild.textContent = `${brandLabel()} Titelbalk Generator `;
  }
}

function detectBrand() {
  // Vast op NL. Optioneel handmatig overschrijven via ?land=VL (geen geo-lookup).
  const land = new URLSearchParams(location.search).get('land');
  if (land) {
    const up = land.toUpperCase();
    if (up === 'NL' || up === 'VL' || up === 'BE') {
      BRAND = up === 'BE' ? 'VL' : up;
    }
  }
  applyBrand();
}
detectBrand();

// ── UvNL kleurenpalet ─────────────────────────────────────────
const UVNL_COLORS = [
  {name:'Varsity Green',  hex:'#004B36'},
  {name:'Electric Purple',hex:'#D6ACFF'},
  {name:'Electric Green', hex:'#00A879'},
  {name:'Electric Yellow',hex:'#FBF07A'},
  {name:'Electric Blue',  hex:'#585FF1'},
  {name:'Electric Red',   hex:'#EE5245'},
  {name:'Additional Pink',hex:'#FFC9D7'},
  {name:'Ballpoint',      hex:'#1B0757'},
  {name:'Printer Ink',    hex:'#2B2B2B'},
  {name:'Paper',          hex:'#F4F0ED'},
  {name:'White',          hex:'#FFFFFF'},
];

// ── State ─────────────────────────────────────────────────────
const DEFAULTS = { fs: 125, mg: 15, gap: 5, bc: '#004B36', tc: '#ffffff', style: 'bold' };
const DEFAULT_TEXTS = [
  'Deze truc laat je 20% meer onthouden',
  'Zo word je 2x slimmer',
  'De wetenschap achter beter leren',
  'Dit doet iets met je brein',
  'Wat niemand je vertelt over studeren',
  'Waarom herhaling het geheim is',
];
let items = [{ ...DEFAULTS, text: DEFAULT_TEXTS[0], open: false }];
let activeIdx = 0;

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function itemToSettings(item) {
  return {
    lines: item.text.split('\n').slice(0,5).map(l => l.trim()).filter(Boolean),
    fs: item.fs, mg: item.mg, gap: item.gap, bc: item.bc, tc: item.tc,
    style: item.style || 'bold'
  };
}
function getSettings() { return itemToSettings(items[activeIdx]); }

function renderItemList() {
  const list = G('itemList');
  list.innerHTML = '';
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'item-card' + (i === activeIdx ? ' active' : '');
    card.innerHTML = `
      <div class="item-row">
        <textarea class="item-text" rows="3" placeholder="Tekst…">${esc(item.text)}</textarea>
        <div class="item-actions">
          <button class="item-btn" title="Instellingen" onclick="toggleItemSettings(${i})">⚙</button>
          ${items.length > 1 ? `<button class="item-btn" title="Verwijder" onclick="removeItem(${i})">×</button>` : ''}
        </div>
      </div>
      <div class="item-settings${item.open ? ' open' : ''}">
        <div class="ctrl">
          <span class="ctrl-label">Stijl</span>
          <select class="style-select" onchange="updateItem(${i},'style',this.value)">
            <option value="bold"${(item.style||'bold')==='bold'?' selected':''}>Oldschool Grotesk Bold</option>
            <option value="condensed"${(item.style||'bold')==='condensed'?' selected':''}>Condensed FULL CAPS</option>
          </select>
        </div>
        <div class="ctrl" style="margin-top:.5rem">
          <span class="ctrl-label">Balk</span>
          <input type="text" class="hex-input" value="${item.bc}" maxlength="7" spellcheck="false" oninput="syncHex(this,${i},'bc')">
          <input type="color" value="${item.bc}" oninput="syncColor(this,${i},'bc')">
          <button class="btn-pipet" title="Pipet — kleur uit scherm pakken" onclick="eyeDropperPick(${i},'bc')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 22 1-4 14-14 3 3L6 21z"/><path d="m14 8 4 4"/></svg></button>
        </div>
        <div class="ctrl">
          <span class="ctrl-label">Tekst</span>
          <input type="text" class="hex-input" value="${item.tc}" maxlength="7" spellcheck="false" oninput="syncHex(this,${i},'tc')">
          <input type="color" value="${item.tc}" oninput="syncColor(this,${i},'tc')">
          <button class="btn-pipet" title="Pipet — kleur uit scherm pakken" onclick="eyeDropperPick(${i},'tc')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 22 1-4 14-14 3 3L6 21z"/><path d="m14 8 4 4"/></svg></button>
        </div>
        <div class="palette-group" style="margin:.6rem 0 .25rem">
          ${UVNL_COLORS.map(c=>`<button class="swatch" style="background:${c.hex}" title="${c.name} · ${c.hex}" onclick="applySwatchTo(${i},'bc','${c.hex}')"></button>`).join('')}
        </div>
        <button onclick="invertItemColors(${i})" style="margin-top:.6rem;background:none;border:none;color:var(--muted);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:0">&#8645; Inverteer</button>
      </div>`;
    const ta = card.querySelector('.item-text');
    ta.addEventListener('focus', () => setActive(i));
    ta.addEventListener('input', () => {
      items[i].text = ta.value;
      if (i === activeIdx) {
        document.querySelectorAll('.canvas-edit-overlay').forEach(o => o.value = ta.value);
        generate();
      }
    });
    list.appendChild(card);
  });
}

function setActive(i) {
  if (activeIdx === i) return;
  activeIdx = i;
  // Alleen de active-klasse wisselen, geen volledige re-render
  document.querySelectorAll('#itemList .item-card').forEach((card, idx) => {
    card.classList.toggle('active', idx === i);
  });
  document.querySelectorAll('.canvas-edit-overlay').forEach(o => o.value = items[i].text);
  generate();
}
function addItem() {
  const text = DEFAULT_TEXTS[items.length % DEFAULT_TEXTS.length];
  items.push({ ...DEFAULTS, text, open: false });
  activeIdx = items.length - 1;
  renderItemList();
  document.querySelectorAll('.canvas-edit-overlay').forEach(o => o.value = text);
  generate();
  updateBtnLabels();
  setTimeout(() => G('itemList').children[activeIdx]?.querySelector('.item-text')?.focus(), 50);
}
function removeItem(i) {
  items.splice(i, 1);
  if (activeIdx >= items.length) activeIdx = items.length - 1;
  renderItemList();
  generate();
  updateBtnLabels();
}
function toggleItemSettings(i) {
  items[i].open = !items[i].open;
  renderItemList();
}
function updateItem(i, key, val) {
  items[i][key] = val;
  if (i === activeIdx) generate();
}
function syncColor(picker, i, key) {
  const val = picker.value;
  updateItem(i, key, val);
  const hex = picker.previousElementSibling;
  if (hex) hex.value = val;
}
function syncHex(input, i, key) {
  let val = input.value.trim();
  if (!val.startsWith('#')) val = '#' + val;
  input.value = val.startsWith('#') ? val : input.value;
  if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
    updateItem(i, key, val);
    const picker = input.nextElementSibling;
    if (picker) picker.value = val;
  }
}
function applySwatchTo(i, key, hex) {
  updateItem(i, key, hex);
  renderItemList();
  if (i === activeIdx) generate();
}
async function eyeDropperPick(i, key) {
  if (!window.EyeDropper) {
    toast('Pipet werkt alleen in Chrome/Edge op desktop');
    return;
  }
  try {
    const { sRGBHex } = await new EyeDropper().open();
    updateItem(i, key, sRGBHex);
    renderItemList();
    if (i === activeIdx) generate();
  } catch (e) { /* user cancelled */ }
}
function invertItemColors(i) {
  [items[i].bc, items[i].tc] = [items[i].tc, items[i].bc];
  renderItemList();
  if (i === activeIdx) generate();
}

// ── Helpers ───────────────────────────────────────────────────
function fontFamilyFor(style) { return style === 'condensed' ? 'OSGC' : 'OSG'; }
function transformCase(s, style) { return style === 'condensed' ? s.toUpperCase() : s; }

function wrapLines(rawLines, maxTW, fontSize, style) {
  const tmp = document.createElement('canvas').getContext('2d');
  tmp.font = `bold ${fontSize}px ${fontFamilyFor(style)}, sans-serif`;
  const out = [];
  for (const raw of rawLines) {
    const text = transformCase(raw, style);
    if (tmp.measureText(text).width <= maxTW) { out.push(text); continue; }
    const words = text.split(' ');
    let cur = '';
    for (const word of words) {
      const test = cur ? cur + ' ' + word : word;
      if (tmp.measureText(test).width <= maxTW) { cur = test; }
      else { if (cur) out.push(cur); cur = word; }
    }
    if (cur) out.push(cur);
  }
  return out;
}

function lineHash(line) {
  return [...line].reduce((a, c) => Math.imul(a, 31) + c.charCodeAt(0) | 0, 0);
}

function getBaseRotation(hash) {
  const r = (Math.abs(hash) % 1000) / 1000;
  return (r * 2 - 1) * 3;
}

// ── Core draw ─────────────────────────────────────────────────
function drawAt(canvas, w, h, s, sc) {
  sc = sc || 1;
  canvas.width  = Math.round(w * sc);
  canvas.height = Math.round(h * sc);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!s.lines.length) return;

  const style = s.style || 'condensed';
  const lines = wrapLines(s.lines, w - 100 - s.mg * 2, s.fs, style);
  const hashes = lines.map(lineHash);

  const fs   = Math.round(s.fs * sc);
  const mg   = Math.round(s.mg * sc);
  const gap  = Math.round(s.gap * sc);
  const vpad = Math.round(fs * 0.09);
  const bh   = fs + vpad * 2;
  const totH = lines.length * bh + Math.max(0, lines.length - 1) * gap;
  const cy   = Math.round((canvas.height - totH) / 2);

  ctx.font = `bold ${fs}px ${fontFamilyFor(style)}, sans-serif`;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign    = 'center';

  // Cap-height ratio (empirisch). Gebruikt als fallback wanneer
  // actualBoundingBox geen bruikbare waarde geeft (oude Safari etc).
  const OSGC_CAP_RATIO = style === 'condensed' ? 0.72 : 0.70;

  lines.forEach((line, i) => {
    const hash     = hashes[i];
    const rotation = getBaseRotation(hash);
    const m     = ctx.measureText(line);
    const tw    = m.width;
    const bw    = Math.ceil(tw + mg * 2);
    const barCx = canvas.width / 2;
    const barCy = cy + i * (bh + gap) + bh / 2;

    // Visueel midden van de glyphs op barCy zetten.
    const asc = m.actualBoundingBoxAscent;
    const dsc = m.actualBoundingBoxDescent;
    const usableAsc = (typeof asc === 'number' && asc > 0) ? asc : fs * OSGC_CAP_RATIO;
    const usableDsc = (typeof dsc === 'number' && dsc >= 0) ? dsc : 0;
    const baselineY = barCy + (usableAsc - usableDsc) / 2;

    ctx.save();
    ctx.translate(barCx, barCy);
    ctx.rotate(rotation * Math.PI / 180);
    ctx.fillStyle = s.bc;
    ctx.fillRect(-bw / 2, -bh / 2, bw, bh);
    ctx.restore();

    ctx.fillStyle = s.tc;
    ctx.fillText(line, barCx, baselineY);
  });
}

function activeFmts() {
  return FMTS.filter(f => G('chk' + f.id) && G('chk' + f.id).checked);
}

function onFmtChange() {
  FMTS.forEach(f => {
    const box = G('box' + f.id);
    const chk = G('chk' + f.id);
    if (box && chk) box.classList.toggle('hidden', !chk.checked);
  });
  updateBtnLabels();
  generate();
}

function updateBtnLabels() {
  const nFmt  = activeFmts().length;
  const nItems = (typeof items !== 'undefined') ? items.filter(it => it.text.trim()).length : 0;
  const total = nItems * nFmt;
  const btnR = G('btnRenderAll');
  const btnD = G('btnDownload');
  if (btnR) btnR.textContent = `↓ Render alles${total > 0 ? ' (' + total + ' PNG' + (total !== 1 ? "'s" : '') + ')' : ''}`;
  if (btnD) btnD.textContent = `↓ Download huidige balk${nFmt > 0 ? ' (' + nFmt + ' PNG' + (nFmt !== 1 ? "'s" : '') + ')' : ''}`;
}

function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  const btn = G('themeBtn');
  if (btn) btn.textContent = isLight ? '☾ Donker' : '☼ Licht';
  try { localStorage.setItem('uvnl_theme', isLight ? 'light' : 'dark'); } catch(e){}
}

let _saveTimer;
function generate() {
  const s = getSettings();
  const dpr = window.devicePixelRatio || 1;
  activeFmts().forEach(f => {
    const el = G('c' + f.id);
    const displayW = el.offsetWidth || el.clientWidth || f.w;
    const sc = (displayW * dpr) / f.w;
    drawAt(el, f.w, f.h, s, sc);
    el.style.width  = displayW + 'px';
    el.style.height = 'auto';
  });
  updateBtnLabels();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => saveEntry(s), 1200);
}

function addEditOverlays() {
  FMTS.forEach(f => {
    const checker = G('c' + f.id).parentElement;
    const overlay = document.createElement('textarea');
    overlay.className = 'canvas-edit-overlay';
    overlay.value = '';
    overlay.addEventListener('focus', () => { overlay.value = items[activeIdx].text; });
    overlay.addEventListener('blur',  () => { overlay.value = ''; });
    overlay.addEventListener('input', () => {
      items[activeIdx].text = overlay.value;
      document.querySelectorAll('.canvas-edit-overlay').forEach(o => { if (o !== overlay) o.value = overlay.value; });
      const activeCard = G('itemList').children[activeIdx];
      if (activeCard) activeCard.querySelector('.item-text').value = overlay.value;
      generate();
    });
    checker.appendChild(overlay);
  });
}

// ── PNG download ──────────────────────────────────────────────
function dlFmt(id, w, h) {
  const s   = getSettings();
  const off = document.createElement('canvas');
  drawAt(off, w, h, s); // static
  const name = (items[activeIdx].text.split('\n')[0] || 'TITEL')
    .toUpperCase().replace(/\s+/g,'_').replace(/[^A-Z0-9_]/g,'').slice(0, 30);
  const a = document.createElement('a');
  a.download = `${brandPrefix()}_${name}_${w}x${h}.png`;
  a.href = off.toDataURL('image/png');
  a.click();
}

function downloadAll() {
  const fmts = activeFmts();
  fmts.forEach((f, i) => setTimeout(() => dlFmt(f.id, f.w, f.h), i * 200));
  toast(`${fmts.length} PNG-bestand${fmts.length !== 1 ? 'en' : ''} worden gedownload...`);
}

function renderAll() {
  let delay = 0;
  let count = 0;
  items.forEach(item => {
    const s = itemToSettings(item);
    if (!s.lines.length) return;
    FMTS.forEach(f => {
      setTimeout(() => {
        const off = document.createElement('canvas');
        drawAt(off, f.w, f.h, s);
        const name = (item.text.split('\n')[0] || 'TITEL')
          .toUpperCase().replace(/\s+/g,'_').replace(/[^A-Z0-9_]/g,'').slice(0, 30);
        const a = document.createElement('a');
        a.download = `${brandPrefix()}_${name}_${f.w}x${f.h}.png`;
        a.href = off.toDataURL('image/png');
        a.click();
      }, delay);
      delay += 300;
    });
    count++;
  });
  toast(`${count * 3} PNG-bestanden worden gedownload...`);
}

// ── Gallery ───────────────────────────────────────────────────
const GKEY = 'uvnl_titelbalk_v1';
const GMAX = 50;

function saveEntry(s) {
  if (!s.lines.length) return;
  const list = loadList();
  list.unshift({ id: Date.now(), ts: new Date().toISOString(), ...s });
  if (list.length > GMAX) list.length = GMAX;
  try { localStorage.setItem(GKEY, JSON.stringify(list)); } catch(e) {}
  renderGallery();
}
function loadList() { try { return JSON.parse(localStorage.getItem(GKEY)) || []; } catch { return []; } }
function renderGallery() {
  const list = loadList(), grid = G('galleryGrid');
  G('gCount').textContent = list.length ? `(${list.length})` : '';
  if (!list.length) { grid.innerHTML = '<p class="empty">Nog geen exports. Typ een titelbalk hierboven.</p>'; return; }
  grid.innerHTML = '';
  list.forEach(entry => {
    const item = document.createElement('div'); item.className = 'gallery-item'; item.title = entry.lines.join(' / ');
    const chk = document.createElement('div'); chk.className = 'checker';
    const th  = document.createElement('canvas'); drawAt(th, 1080, 1080, entry, 100/1080); chk.appendChild(th);
    const meta = document.createElement('div'); meta.className = 'gallery-meta';
    const d = new Date(entry.ts);
    meta.textContent = entry.lines[0] + ' \u00b7 ' + d.toLocaleDateString('nl-NL') + ' ' + d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
    item.onclick = () => loadEntry(entry);
    item.appendChild(chk); item.appendChild(meta); grid.appendChild(item);
  });
}
function loadEntry(e) {
  items[activeIdx] = { text: e.lines.join('\n'), fs: e.fs, mg: e.mg, gap: e.gap, bc: e.bc, tc: e.tc, style: e.style || 'condensed', open: items[activeIdx].open };
  renderItemList();
  document.querySelectorAll('.canvas-edit-overlay').forEach(o => o.value = items[activeIdx].text);
  generate();
}

// ── URL params ────────────────────────────────────────────────
function applyUrlParams() {
  const p = new URLSearchParams(location.search);
  if (!p.has('t')) return;
  items[activeIdx].text = decodeURIComponent(p.get('t').replace(/\+/g,' '));
  if (p.has('fs')) { const v = +p.get('fs'); if (v>=40&&v<=180) items[activeIdx].fs = v; }
  if (p.has('style')) { const v = p.get('style'); if (v==='bold'||v==='condensed') items[activeIdx].style = v; }
  renderItemList();
  generate();
  if (p.get('dl') === '1') setTimeout(renderAll, 900);
}

// ── Toast ─────────────────────────────────────────────────────
let _tt;
function toast(msg) {
  const b = G('statusBar'); b.textContent = msg; b.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => b.classList.remove('show'), 3000);
}
</script>
